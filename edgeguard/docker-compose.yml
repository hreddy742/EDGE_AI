services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: edgeguard-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./edgeguard.db:/app/edgeguard.db

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: edgeguard-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
      - BROWSER_API_BASE_URL=http://localhost:8000
    depends_on:
      - api
